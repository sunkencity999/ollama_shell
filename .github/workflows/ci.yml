name: CI

on:
  push:
    branches: [main, "reimagine/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install (core + dev + tui)
        run: uv pip install -e ".[dev,tui]"

      - name: Lint (ruff)
        run: uv run ruff check oshell tests

      - name: Type-check (mypy)
        run: uv run mypy oshell || true  # advisory until fully annotated

      - name: Test (pytest)
        # Ollama is not available in CI, so live smoke tests self-skip.
        run: uv run pytest -q --cov=oshell --cov-report=term-missing
